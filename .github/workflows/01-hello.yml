name: Hello World

on: 
    push:
        branches:
            - main

jobs: 
    greet:
        runs-on: ubuntu-latest     
        
        steps:

            - name: Print Greeting
              run: echo "Hello Github Actions"

            - name: Print Date
              run: date
              
            - name: Print OS runner
              run: echo "running on ${{ runner.os }}"  
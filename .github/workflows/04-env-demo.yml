name: Env Variables Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: handbook
  ENVIRONMENT: dev

jobs:
  show-workflow-env:
    runs-on: ubuntu-latest
    steps:
      - name: Show workflow env and built-in vars
        run: |
          echo "App name: $APP_NAME"
          echo "Environment: $ENVIRONMENT"
          echo "Commit SHA: $GITHUB_SHA"
          echo "Triggered by: $GITHUB_ACTOR"
          echo "Branch: $GITHUB_REF_NAME"

  show-job-env:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: staging
    steps:
      - name: Show job-level env
        run: |
          echo "App name: $APP_NAME"
          echo "Environment: $ENVIRONMENT"

  show-step-env:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: staging
    steps:
      - name: Step A uses job-level env
        run: echo "Environment: $ENVIRONMENT"

      - name: Step B overrides at step level
        env:
          ENVIRONMENT: production
        run: echo "Environment: $ENVIRONMENT"




   

    